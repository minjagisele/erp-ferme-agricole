<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ERP Agricole</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card auth-card">
                    <div class="auth-header">
                        <div class="auth-logo">🌱</div>
                        <h3 class="fw-bold text-dark">Créer un compte</h3>
                        <p class="text-muted small">Rejoignez la plateforme de gestion agricole</p>
                    </div>
                    
                    <div class="card-body p-4 pt-0">
                        <form method="POST" id="registerForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nom d'utilisateur</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="username" id="username" placeholder="wesley_dev" required>
                                </div>
                                <div id="usernameFeedback" class="form-text small"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Email professionnel</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" name="email" id="email" placeholder="nom@ferme.com" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Mot de passe</label>
                                    <input type="password" class="form-control" name="password" id="password" placeholder="••••••••" required>
                                    <div class="progress mt-2" style="height: 4px;">
                                        <div id="passwordStrength" class="progress-bar" role="progressbar" style="width: 0%"></div>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Confirmation</label>
                                    <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label small text-muted" for="terms">
                                        J'accepte les <a href="#" class="text-decoration-none" style="color: var(--primary-green)">conditions d'utilisation</a>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-auth w-100 text-white shadow-sm">
                                Créer mon compte <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </form>
                        
                        <div class="text-center mt-4 border-top pt-3">
                            <p class="text-muted small">Vous avez déjà un compte ? 
                                <a href="{{ url_for('auth.login') }}" class="fw-bold text-decoration-none" style="color: var(--primary-green)">Se connecter</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth_validation.js') }}"></script>
</body>
</html>
